<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; color: #333; margin-bottom: 12px; }
    p { font-size: 16px; color: #666; line-height: 1.7; margin-bottom: 10px; }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요!</h1>
    <p>바이브코딩으로 만든 나의 첫 번째 웹사이트입니다.</p>
    <p>GitHub Pages를 통해 배포된 페이지예요.</p>
    <div class="badge">🚀 Powered by GitHub Pages</div>
  </div>
</body>
</html>
