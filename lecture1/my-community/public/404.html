<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JGA</title>
  <script>
    // SPA routing fix for GitHub Pages
    // When GitHub Pages serves this 404.html, redirect to the React app with the path encoded in the query string
    var pathSegmentsToKeep = 2; // /vibecoding/my-community
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
