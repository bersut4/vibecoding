name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── my-community 빌드 ──
      - name: Install my-community dependencies
        working-directory: lecture1/my-community
        run: npm install

      - name: Build my-community
        working-directory: lecture1/my-community
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── portfolio 빌드 ──
      - name: Install portfolio dependencies
        working-directory: lecture1/portfolio
        run: npm install

      - name: Build portfolio
        working-directory: lecture1/portfolio
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── my-app 빌드 ──
      - name: Install my-app dependencies
        working-directory: lecture1/my-app
        run: npm install

      - name: Build my-app
        working-directory: lecture1/my-app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY }}

      # ── bersut4/my-app gh-pages 배포 ──
      - name: Deploy my-app to bersut4/my-app gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.MY_APP_DEPLOY_TOKEN }}
          external_repository: bersut4/my-app
          publish_branch: gh-pages
          publish_dir: ./lecture1/my-app/dist

      # ── 배포 디렉토리 구성 ──
      - name: Prepare deployment directory
        run: |
          mkdir -p _site/my-community
          mkdir -p _site/portfolio
          mkdir -p _site/my-app
          cp index.html _site/index.html
          cp -r lecture1/my-community/dist/. _site/my-community/
          cp -r lecture1/portfolio/dist/. _site/portfolio/
          cp -r lecture1/my-app/dist/. _site/my-app/
          cp _site/my-community/404.html _site/404.html
          cp _site/portfolio/index.html _site/portfolio/404.html
          cp _site/my-app/index.html _site/my-app/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
